<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Temporary Notepad</title>

  <link rel="icon" type="image/png" href="note.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="top-bar">
    <div class="left-controls">
      <button onclick="downloadPDF()">Save as PDF</button>
      <button class="clear-btn" onclick="clearAll()">Clear All</button>
    </div>

    <div class="right-controls">
      <button onclick="toggleDarkMode()" id="darkModeBtn">🌙 Dark Mode</button>
    </div>
  </div>

  <h1>Notepad</h1>

  <input type="text" id="title" placeholder="Note Title" />

  <select id="fontSelector">
    <option value="Arial, sans-serif">Arial</option>
    <option value="Georgia, serif">Georgia</option>
    <option value="Courier New, monospace">Courier New</option>
    <option value="Verdana, sans-serif">Verdana</option>
    <option value="Times New Roman, serif">Times New Roman</option>
  </select>

  <textarea id="note" placeholder="Start typing your note..."></textarea>

  <div class="footer">
    Autosaved. Font and notes saved in your browser.
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
