<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notepad</title>

  <link rel="icon" type="image/png" href="note.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Interactive Background -->
  <canvas id="gridCanvas"></canvas>

  <!-- App -->
  <div class="app-shell">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">

        <div class="dropdown">
          <button id="saveBtn">Save ▼</button>

          <div class="dropdown-menu" id="saveMenu">
            <button onclick="downloadPDF()">Save as PDF</button>
            <button onclick="downloadTXT()">Save as TXT</button>
            <button onclick="downloadHTML()">Save as HTML</button>
          </div>
        </div>

        <button onclick="clearAll()">Clear</button>
        <button onclick="undoEdit()">↶</button>
        <button onclick="redoEdit()">↷</button>

        <select id="fontSelector">
          <option value="Arial, sans-serif">Arial</option>
          <option value="Verdana, sans-serif">Verdana</option>
          <option value="Tahoma, sans-serif">Tahoma</option>
          <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="Times New Roman, serif">Times New Roman</option>
          <option value="Courier New, monospace">Courier New</option>
          <option value="Consolas, monospace">Consolas</option>
        </select>

        <button id="findToggleBtn">Find / Replace</button>
      </div>

      <div class="toolbar-right">
        <button id="darkModeBtn" onclick="toggleDarkMode()">🌙</button>
      </div>
    </div>

    <!-- Search -->
    <div class="search-panel hidden" id="searchPanel">
      <input type="text" id="searchInput" placeholder="Find">
      <input type="text" id="replaceInput" placeholder="Replace">

      <button onclick="findPrevious()">Prev</button>
      <button onclick="findNext()">Next</button>
      <button onclick="replaceCurrent()">Replace</button>
      <button onclick="replaceAll()">All</button>

      <span id="matchInfo" class="match-badge">0 matches</span>

      <button id="closeSearchBtn">✕</button>
    </div>

    <!-- Document -->
    <div class="editor-card">
      <input
        type="text"
        id="title"
        class="title-input"
        placeholder="Untitled Document"
      >

      <div class="editor-divider"></div>

      <textarea id="note" placeholder="Start typing..."></textarea>
    </div>

    <!-- Footer -->
    <div class="stats-card">
      <span id="stats">Words: 0 | Characters: 0 | Lines: 0 | Sentences: 0</span>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
